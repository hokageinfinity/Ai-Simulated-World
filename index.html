<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hokage Infinity World</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>🌎 Hokage Infinity World</h1>

<div class="panel">

<h2>World Status</h2>

<p>Year: <span id="year">1</span></p>
<p>Day: <span id="day">1</span></p>

<p>Population: <span id="population">50</span></p>

<p>Food: <span id="food">500</span></p>

<p>Wood: <span id="wood">200</span></p>

<p>Stone: <span id="stone">100</span></p>

</div>

<div class="panel">

<h2>World Controls</h2>

<button id="nextDayBtn">
Advance One Day
</button>

</div>

<div class="panel">

<h2>Create Event</h2>

<input
id="eventInput"
placeholder="A dragon attacks..."
>

<button id="eventBtn">
Create Event
</button>

</div>

<div class="panel">

<h2>World History</h2>

<div id="history"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
